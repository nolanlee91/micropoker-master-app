<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161B22"/>
      <stop offset="1" stop-color="#0B0E14"/>
    </linearGradient>
    <linearGradient id="spade" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#67f09a"/>
      <stop offset="0.55" stop-color="#54e98a"/>
      <stop offset="1" stop-color="#2db866"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#54e98a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#54e98a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background (safe for maskable) -->
